<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training Timer - DotStyle Pro</title>
    <style>
        :root {
            --bg-color: #0f172a; 
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --primary: #38bdf8;   
            --success: #4ade80;   
            --warning: #f59e0b;
            --danger: #f87171;
            --dot-empty: #334155; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 16px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 480px; background: var(--card-bg); padding: 24px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        
        h1, h2, h3 { text-align: center; margin-bottom: 24px; font-weight: 700; letter-spacing: -0.5px; }
        .screen { display: none; }
        .screen.active { display: block; }
        
        /* ボタンデザイン */
        button { width: 100%; padding: 16px; margin: 10px 0; border: none; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; }
        .btn-primary { background: var(--primary); color: #0f172a; }
        .btn-secondary { background: #334155; color: var(--text-main); }
        .btn-success { background: var(--success); color: #0f172a; }
        .btn-danger { background: var(--danger); color: #0f172a; }
        .btn-warning { background: var(--warning); color: #0f172a; }
        button:active { transform: scale(0.98); opacity: 0.9; }

        /* ナビゲーションボタン */
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 10px; }
        .btn-nav { padding: 10px; font-size: 14px; background: #334155; color: var(--text-sub); border-radius: 10px; margin: 0; }
        .btn-nav:hover { color: var(--text-main); background: #475569; }

        /* 入力フォーム・セレクトボックス */
        select, input[type="text"], input[type="number"] { width: 100%; padding: 14px; font-size: 16px; border-radius: 14px; border: 2px solid #334155; margin-bottom: 15px; background: #0f172a; color: var(--text-main); }
        label { display: block; margin-bottom: 6px; font-size: 14px; color: var(--text-sub); font-weight: 600; }

        /* タイマー・表示エリア */
        .timer-display { text-align: center; margin: 15px 0; }
        .phase-title { font-size: 22px; font-weight: 700; color: var(--text-main); min-height: 70px; display: flex; align-items: center; justify-content: center; padding: 0 10px; line-height: 1.4; }
        .next-phase { font-size: 14px; color: var(--text-sub); margin-top: 8px; min-height: 20px; text-align: center; }
        
        /* メインボックス切り替え */
        .display-main-box { height: 130px; display: flex; align-items: center; justify-content: center; margin: 10px 0; }
        .time-left { font-size: 96px; font-weight: 800; font-family: 'Courier New', Courier, monospace; color: var(--primary); line-height: 1; }
        .btn-done-action { background: var(--success); color: #0f172a; font-size: 28px; font-weight: 800; border-radius: 20px; height: 100px; width: 80%; box-shadow: 0 8px 20px rgba(74, 222, 128, 0.3); margin: 0 auto; }
        
        /* 矢印表示エリア（大きく、囲みや境界線を撤去） */
        .direction-box { height: 120px; display: flex; align-items: center; justify-content: center; font-size: 110px; margin: 10px 0; min-height: 120px; background: transparent; }
        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        /* 編集用の共通カードスタイル */
        .edit-item-card, .menu-manage-card { background: #0f172a; padding: 16px; border-radius: 14px; margin-bottom: 12px; border: 1px solid #334155; position: relative; }
        .edit-item-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
        .checkbox-label { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-main); cursor: pointer; margin-top: 4px; }
        .checkbox-label input { width: 16px; height: 16px; }
        
        /* アクションボタンエリア */
        .edit-card-actions { display: grid; grid-template-columns: 1fr 1fr 1.5fr; gap: 8px; margin-top: 12px; }
        .btn-action-small { padding: 8px; margin: 0; font-size: 12px; border-radius: 8px; }

        /* メニュー並び替え用カード固有スタイル */
        .menu-manage-card { display: flex; flex-direction: column; justify-content: space-between; }
        .menu-title-text { font-size: 16px; font-weight: bold; margin-bottom: 10px; color: var(--text-main); word-break: break-all; }

        /* DotHabit風カレンダー */
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; text-align: center; }
        .day-name { font-weight: 600; color: var(--text-sub); font-size: 12px; padding-bottom: 8px; }
        
        .day-cell { aspect-ratio: 1; border-radius: 50%; background: var(--dot-empty); font-size: 11px; color: var(--text-sub); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; border: 2px solid transparent; }
        .day-cell.empty { background: transparent; cursor: default; }
        .day-cell:not(.empty):hover { border-color: var(--primary); }
        
        .day-cell.completed { background: var(--success) !important; color: #0f172a !important; font-weight: bold; }
        .day-cell.interrupted { background: var(--warning) !important; color: #0f172a !important; font-weight: bold; }

        .log-details { margin-top: 24px; padding: 16px; background: #0f172a; border-radius: 14px; font-size: 14px; min-height: 70px; border: 1px solid #334155; color: var(--text-sub); }
        .log-details strong { color: var(--text-main); }

        /* 進行中ジャンプ用のセレクトボックススタイル */
        .jump-select-container { margin-bottom: 10px; }
        .jump-select-container label { font-size: 12px; margin-bottom: 3px; color: var(--primary); }
        select.jump-select { padding: 8px 12px; font-size: 14px; margin-bottom: 0; background: #1e293b; border-color: #475569; }
    </style>
</head>
<body>

<div class="container">
    <div id="screen-start" class="screen active">
        <h1>Training Timer</h1>
        <div style="margin-bottom: 20px; text-align: center; color: var(--text-sub); font-size: 14px;">メニューを選んでスタート</div>
        <select id="menu-select"><option value="">読み込み中...</option></select>
        <button class="btn-primary" onclick="startTraining()">トレーニング開始</button>
        <button class="btn-secondary" onclick="openEditScreen1()">⚙️ メニューの編集・作成</button>
        <button class="btn-secondary" onclick="changeScreen('screen-record'); renderCalendar();">Record</button>
    </div>

    <div id="screen-edit-1" class="screen">
        <h2>メニューの編集・並び替え</h2>
        
        <div style="margin-bottom: 20px; background: #0f172a; padding: 16px; border-radius: 14px; border: 1px solid #334155;">
            <label for="new-menu-title" style="color: var(--primary);">✨ 新しいメニューを作成</label>
            <input type="text" id="new-menu-title" placeholder="例：DAY8：瞬発ステップ特化" style="margin-bottom: 10px;">
            <button class="btn-success" onclick="createNewMenu()" style="margin: 0; padding: 12px;">新規作成して中身を編集</button>
        </div>

        <label>既存メニューの一覧・並び替え</label>
        <div style="max-height: 320px; overflow-y: auto; margin-bottom: 15px; padding-right: 4px;" id="menu-list-container"></div>

        <button class="btn-secondary" onclick="changeScreen('screen-start')">戻る</button>
    </div>

    <div id="screen-edit-2" class="screen">
        <h2>メニュー中身の編集</h2>
        <div style="margin-bottom: 15px;">
            <label>メニュータイトル</label>
            <input type="text" id="edit-current-menu-title">
        </div>
        
        <div style="max-height: 380px; overflow-y: auto; margin-bottom: 15px; padding-right: 4px;" id="edit-items-container"></div>

        <button class="btn-success" onclick="addNewItemRow()">➕ 種目を追加</button>
        <button class="btn-primary" onclick="saveEditedMenu()">💾 変更を保存</button>
        <button id="btn-delete-menu" class="btn-danger" onclick="deleteMenu()">🗑️ このメニューを削除</button>
        <button class="btn-secondary" onclick="changeScreen('screen-edit-1')">キャンセル</button>
    </div>

    <div id="screen-timer" class="screen">
        <div class="jump-select-container">
            <label for="timer-jump-select">🏃‍♂️ 現在の進行度（タップして種目を移動）</label>
            <select id="timer-jump-select" class="jump-select" onchange="jumpToPhase(this.value)"></select>
        </div>

        <div class="nav-grid">
            <button class="btn-nav" onclick="prevMenu()">◀ 前のメニュー</button>
            <button class="btn-nav" onclick="nextMenu()">次のメニュー ▶</button>
        </div>

        <div class="timer-display">
            <div id="current-phase" class="phase-title">ウォームアップ</div>
            <div id="next-phase" class="next-phase">次: ---</div>
            
            <div class="display-main-box">
                <div id="time-left" class="time-left">00</div>
                <button id="btn-done" class="btn-done-action" onclick="pressDone()" style="display:none;">DONE</button>
            </div>

            <div id="direction-arrow" class="direction-box"></div>
        </div>
        <div class="control-grid">
            <button id="btn-pause" class="btn-warning" onclick="togglePause()">一時停止</button>
            <button class="btn-danger" onclick="interruptTraining()">中断</button>
        </div>
    </div>

    <div id="screen-record" class="screen">
        <h2>Training Record</h2>
        <div class="calendar-header">
            <button style="width:auto; padding: 8px 16px;" class="btn-secondary" onclick="moveMonth(-1)">&lt;</button>
            <span id="calendar-month-year" style="font-weight: bold; font-size: 18px; color: var(--text-main);"></span>
            <button style="width:auto; padding: 8px 16px;" class="btn-secondary" onclick="moveMonth(1)">&gt;</button>
        </div>
        <div id="calendar-grid" class="calendar-grid"></div>
        <div id="log-details" class="log-details">タップした日付のトレーニングログがここに表示されます。</div>
        <button class="btn-secondary" onclick="changeScreen('screen-start')" style="margin-top: 20px;">メニューに戻る</button>
    </div>
</div>

<script>
function parseSetsToItems(name, workSec, restSec, sets, isRandom, isCountBase) {
    return { name, w: workSec, r: restSec, s: sets, rand: isRandom, c: isCountBase };
}

const DEFAULT_MENUS = {
    "DAY1": { title: "DAY1：神経系フットワーク", items: [parseSetsToItems("ラインホップ前後", 15, 30, 5, false, false), parseSetsToItems("ラインホップ左右", 15, 30, 5, false, false), parseSetsToItems("片脚ラインホップ", 12, 30, 3, false, false), parseSetsToItems("ポゴジャンプ", 12, 40, 5, false, false), parseSetsToItems("スプリット→爆発1歩 (8回)", 0, 45, 4, false, true), parseSetsToItems("チャイナステップ→ランダム反応", 12, 35, 5, true, false), parseSetsToItems("反応スプリット→爆発1歩", 12, 40, 5, true, false)] },
    "DAY2": { title: "DAY2：最大筋力＋減速能力", items: [parseSetsToItems("スクワット (5回)", 0, 180, 5, false, true), parseSetsToItems("ブルガリアンスクワット (6回/脚)", 0, 120, 4, false, true), parseSetsToItems("デッドリフト (4回)", 0, 180, 4, false, true), parseSetsToItems("スプリットスクワット (8回/脚)", 0, 90, 3, false, true), parseSetsToItems("ヒップスラスト (8回)", 0, 120, 3, false, true), parseSetsToItems("ノルディックハム (5回)", 0, 90, 3, false, true), parseSetsToItems("コペンハーゲンプランク", 30, 30, 3, false, false), parseSetsToItems("プランク (45秒)", 45, 30, 3, false, false)] },
    "DAY3": { title: "DAY3：コート神経系フットワーク", items: [parseSetsToItems("前後2点ベース往復", 15, 40, 6, false, false), parseSetsToItems("左右2点ベース往復", 15, 40, 6, false, false), parseSetsToItems("6方向フットワーク", 15, 45, 10, false, false), parseSetsToItems("スプリット→6方向反応移動", 15, 45, 10, true, false), parseSetsToItems("ランダム方向反応フットワーク", 15, 45, 10, true, false), parseSetsToItems("後方打球→前ネット切り返し", 15, 45, 6, false, false), parseSetsToItems("高速連続シャドー", 15, 30, 10, false, false), parseSetsToItems("前衛高速プッシュ連続", 15, 30, 8, false, false), parseSetsToItems("フォーム維持シャドー", 40, 40, 6, false, false), parseSetsToItems("軽フットワーク流し", 300, 0, 1, false, false)] },
    "DAY4": { title: "DAY4：積極回復＋循環", items: [parseSetsToItems("股関節モビリティ (10回/方向)", 0, 0, 1, false, true), parseSetsToItems("足首モビリティ (15回/脚)", 0, 0, 1, false, true), parseSetsToItems("胸椎モビリティ (10回/側)", 0, 0, 1, false, true), parseSetsToItems("Zone2ジョグ or バイク", 1050, 0, 1, false, false), parseSetsToItems("足底リリース", 150, 0, 1, false, false)] },
    "DAY5": { title: "DAY5：パワー＋横方向SSC", items: [parseSetsToItems("スクワットジャンプ (4回)", 0, 120, 5, false, true), parseSetsToItems("ブルガリアンジャンプ (4回/脚)", 0, 90, 5, false, true), parseSetsToItems("スケータージャンプ (6回/側)", 0, 60, 4, false, true), parseSetsToItems("ラテラルバウンド (5回/側)", 0, 75, 4, false, true), parseSetsToItems("片脚ホップ (5回/脚)", 0, 60, 4, false, true), parseSetsToItems("デプスジャンプ (3回)", 0, 90, 4, false, true), parseSetsToItems("ポゴジャンプ", 12, 40, 4, false, false)] },
    "DAY6": { title: "DAY6：調整＋神経維持", items: [parseSetsToItems("軽チャイナステップ", 20, 30, 3, false, false), parseSetsToItems("軽ポゴジャンプ", 10, 30, 3, false, false), parseSetsToItems("反応スプリット→爆発1歩", 10, 40, 4, true, false), parseSetsToItems("低強度フォームシャドー", 20, 30, 4, false, false), parseSetsToItems("デッドバグ (10回)", 0, 20, 2, false, true), parseSetsToItems("YTW (10回)", 0, 30, 2, false, true), parseSetsToItems("チューブ外旋 (15回)", 0, 30, 2, false, true), parseSetsToItems("股関節モビリティ (10回/方向)", 0, 0, 1, false, true), parseSetsToItems("足首モビリティ (15回/脚)", 0, 0, 1, false, true)] },
    "DAY7": { title: "DAY7：コート実戦統合", items: [parseSetsToItems("6方向フットワーク", 30, 45, 8, false, false), parseSetsToItems("6方向連続フットワーク", 30, 45, 8, false, false), parseSetsToItems("ランダム方向反応フットワーク", 20, 45, 10, true, false), parseSetsToItems("後方スマッシュ→ベース戻り", 20, 40, 8, false, false), parseSetsToItems("前衛左右プッシュ→中央戻り", 20, 30, 8, false, false), parseSetsToItems("左右スマッシュ→ベース戻り", 30, 45, 6, false, false), parseSetsToItems("全面ラリー継続シャドー", 45, 45, 8, false, false), parseSetsToItems("スマッシュ→レシーブ切替", 30, 30, 8, false, false), parseSetsToItems("疲労下6方向フットワーク維持", 40, 40, 6, false, false), parseSetsToItems("フォーム維持シャドー", 40, 40, 4, false, false), parseSetsToItems("軽フットワーク流し", 300, 0, 1, false, false)] }
};

function createSets(name, workSec, restSec, sets, isRandom = false, isCountBase = false) {
    let arr = [];
    for (let i = 1; i <= sets; i++) {
        if(isCountBase) {
            arr.push({ name: `${name} [${i}/${sets}]`, type: "count", duration: 0, isRandom: isRandom });
        } else {
            arr.push({ name: `${name} [${i}/${sets}]`, type: "work", duration: workSec, isRandom: isRandom });
        }
        if (restSec > 0) {
            arr.push({ name: `${name} (休憩) [${i}/${sets}]`, type: "rest", duration: restSec, isRandom: false });
        }
    }
    return arr;
}

const COMMON_WARMUP = [
    { name: "レッグスイング 前後 (15回/脚)", type: "count", duration: 0, isRandom: false },
    { name: "レッグスイング 左右 (15回/脚)", type: "count", duration: 0, isRandom: false },
    { name: "股関節回し (10回/方向)", type: "count", duration: 0, isRandom: false },
    { name: "ワールドグレイテストストレッチ (5回/側)", type: "count", duration: 0, isRandom: false },
    { name: "足首背屈モビリティ (15回/脚)", type: "count", duration: 0, isRandom: false },
    ...createSets("ジョグ (60秒)", 60, 30, 2),
    ...createSets("サイドステップ (20秒)", 20, 20, 2),
    ...createSets("クロスステップ (20秒)", 20, 20, 2),
    ...createSets("軽チャイナステップ (20秒)", 20, 30, 3)
];

const COMMON_COOLDOWN = [
    ...createSets("ふくらはぎストレッチ (30秒/側)", 30, 0, 2),
    ...createSets("足底ストレッチ (30秒)", 30, 0, 2),
    ...createSets("股関節ストレッチ (30秒/側)", 30, 0, 2),
    ...createSets("臀筋ストレッチ (30秒/側)", 30, 0, 2),
    { name: "胸椎回旋ストレッチ (10回/側)", type: "count", duration: 0, isRandom: false }
];

let MENUS = {};
let currentTimeline = [];
let currentIdx = 0;
let timerId = null;
let timeLeft = 0;
let isPaused = false;
let selectedMenuKey = "";
let directionTimerId = null;
let clearArrowTimerId = null;
const DIRECTIONS = ["⬆️", "⬇️", "⬅️", "➡️", "↖️", "↗️", "↙️", "↘️"];
let audioCtx = null;
let wakeLock = null; // スリープ防止用

window.addEventListener('DOMContentLoaded', () => {
    loadMenus();
    refreshMainScreenSelect();
    
    // 【音声バグ改善】バックグラウンドから復帰した際にAudioContextを復活させる
    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') {
            resumeAudioContext();
            // スリープ防止を再要求
            if (document.getElementById('screen-timer').classList.contains('active')) {
                requestWakeLock();
            }
        } else {
            // バックグラウンド時はスリープ防止を一時解除
            releaseWakeLock();
        }
    });
});

function loadMenus() {
    const saved = localStorage.getItem("custom_habit_menus");
    if (saved) {
        MENUS = JSON.parse(saved);
    } else {
        MENUS = JSON.parse(JSON.stringify(DEFAULT_MENUS));
        saveMenusToStorage();
    }
}

function saveMenusToStorage() {
    localStorage.setItem("custom_habit_menus", JSON.stringify(MENUS));
}

function refreshMainScreenSelect() {
    const mainSelect = document.getElementById("menu-select");
    mainSelect.innerHTML = "";
    for (let key in MENUS) {
        let opt = document.createElement("option");
        opt.value = key; opt.textContent = MENUS[key].title;
        mainSelect.appendChild(opt);
    }
}

// 【スリープ防止機能】
async function requestWakeLock() {
    try {
        if ('wakeLock' in navigator) {
            wakeLock = await navigator.wakeLock.request('screen');
        }
    } catch (err) {
        console.log(`Wake Lock Error: ${err.name}, ${err.message}`);
    }
}

function releaseWakeLock() {
    if (wakeLock !== null) {
        wakeLock.release();
        wakeLock = null;
    }
}

// 【音声バグ改善】AudioContext復帰処理
function resumeAudioContext() {
    if (audioCtx) {
        if (audioCtx.state === 'suspended' || audioCtx.state === 'interrupted') {
            audioCtx.resume().then(() => {
                console.log("AudioContext successfully resumed.");
            }).catch(e => console.log(e));
        }
    }
}

function playTone(freq, duration) {
    try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        resumeAudioContext(); // 再アクティブ化を徹底
        
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = 'triangle'; 
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(1.00, audioCtx.currentTime); 
        gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    } catch (e) { console.log(e); }
}

function changeScreen(screenId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
    
    // タイマー画面以外に遷移した場合はスリープ防止を解除
    if (screenId !== 'screen-timer') {
        releaseWakeLock();
    }
}

function buildMainTimelineItems(itemsArray) {
    let timeline = [];
    itemsArray.forEach(item => {
        for (let i = 1; i <= item.s; i++) {
            if (item.c) {
                timeline.push({ name: `${item.name} [${i}/${item.s}]`, type: "count", duration: 0, isRandom: !!item.rand });
            } else {
                timeline.push({ name: `${item.name} [${i}/${item.s}]`, type: "work", duration: item.w, isRandom: !!item.rand });
            }
            if (item.r > 0) {
                timeline.push({ name: `${item.name} (休憩) [${i}/${item.s}]`, type: "rest", duration: item.r, isRandom: false });
            }
        }
    });
    return timeline;
}

// --- メニュー編集画面１ ---
function openEditScreen1() {
    renderMenuManageCards();
    changeScreen('screen-edit-1');
}

function createNewMenu() {
    const titleInput = document.getElementById("new-menu-title").value.trim();
    if (!titleInput) { alert("新規メニュー名を入力してください。"); return; }
    const newKey = "CUSTOM_" + Date.now();
    MENUS[newKey] = { title: titleInput, items: [{ name: "最初の種目", w: 15, r: 30, s: 3, rand: false, c: false }] };
    saveMenusToStorage();
    document.getElementById("new-menu-title").value = "";
    openEditScreen2(newKey);
}

function renderMenuManageCards() {
    const container = document.getElementById("menu-list-container");
    container.innerHTML = "";
    const keys = Object.keys(MENUS);
    keys.forEach((key, index) => {
        const card = document.createElement("div");
        card.className = "menu-manage-card";
        card.setAttribute("data-key", key);
        card.innerHTML = `
            <div class="menu-title-text">${MENUS[key].title}</div>
            <div class="edit-card-actions">
                <button class="btn-secondary btn-action-small btn-menu-up" onclick="moveMenuKeyUp('${key}')">🔼 上へ</button>
                <button class="btn-secondary btn-action-small btn-menu-down" onclick="moveMenuKeyDown('${key}')">🔽 下へ</button>
                <button class="btn-primary btn-action-small" onclick="openEditScreen2('${key}')">⚙️ 編集</button>
            </div>
        `;
        container.appendChild(card);
        if (index === 0) card.querySelector(".btn-menu-up").style.visibility = "hidden";
        if (index === keys.length - 1) card.querySelector(".btn-menu-down").style.visibility = "hidden";
    });
}

function moveMenuKeyUp(key) {
    const keys = Object.keys(MENUS);
    const idx = keys.indexOf(key);
    if (idx > 0) {
        const temp = keys[idx]; keys[idx] = keys[idx - 1]; keys[idx - 1] = temp;
        reorderMenusObject(keys);
    }
}

function moveMenuKeyDown(key) {
    const keys = Object.keys(MENUS);
    const idx = keys.indexOf(key);
    if (idx !== -1 && idx < keys.length - 1) {
        const temp = keys[idx]; keys[idx] = keys[idx + 1]; keys[idx + 1] = temp;
        reorderMenusObject(keys);
    }
}

function reorderMenusObject(newKeyArray) {
    let newMenus = {};
    newKeyArray.forEach(k => { newMenus[k] = MENUS[k]; });
    MENUS = newMenus;
    saveMenusToStorage();
    refreshMainScreenSelect();
    renderMenuManageCards();
}

// --- メニュー編集画面２ ---
let temporaryEditKey = "";
function openEditScreen2(key) {
    temporaryEditKey = key;
    const container = document.getElementById("edit-items-container");
    container.innerHTML = "";
    document.getElementById("edit-current-menu-title").value = MENUS[key].title;
    document.getElementById("btn-delete-menu").style.display = "block";
    MENUS[key].items.forEach(item => { addNewItemRow(item); });
    changeScreen('screen-edit-2');
    updateSortButtons();
}

function addNewItemRow(item = {name:"", w:15, r:30, s:3, rand:false, c:false}) {
    const container = document.getElementById("edit-items-container");
    const card = document.createElement("div");
    card.className = "edit-item-card";
    card.innerHTML = `
        <label>種目名</label>
        <input type="text" class="item-name" value="${item.name}" placeholder="例：ラインホップ前後">
        <div class="edit-item-grid">
            <div><label>運動(秒)</label><input type="number" class="item-w" value="${item.w}" min="0"></div>
            <div><label>休憩(秒)</label><input type="number" class="item-r" value="${item.r}" min="0"></div>
        </div>
        <div class="edit-item-grid">
            <div><label>セット数</label><input type="number" class="item-s" value="${item.s}" min="1"></div>
            <div style="display:flex; flex-direction:column; justify-content:center; padding-left:10px;">
                <label class="checkbox-label"><input type="checkbox" class="item-rand" ${item.rand ? 'checked' : ''}> 矢印表示</label>
                <label class="checkbox-label"><input type="checkbox" class="item-c" ${item.c ? 'checked' : ''}> DONEボタン化</label>
            </div>
        </div>
        <div class="edit-card-actions">
            <button class="btn-secondary btn-action-small btn-move-up" onclick="moveCardUp(this)">🔼 上へ</button>
            <button class="btn-secondary btn-action-small btn-move-down" onclick="moveCardDown(this)">🔽 下へ</button>
            <button class="btn-danger btn-action-small" onclick="this.parentElement.parentElement.remove(); updateSortButtons();">❌ この種目を削除</button>
        </div>
    `;
    container.appendChild(card);
    updateSortButtons();
    card.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function moveCardUp(button) {
    const card = button.parentElement.parentElement;
    const previousCard = card.previousElementSibling;
    if (previousCard) { card.parentElement.insertBefore(card, previousCard); updateSortButtons(); }
}

function moveCardDown(button) {
    const card = button.parentElement.parentElement;
    const nextCard = card.nextElementSibling;
    if (nextCard) { card.parentElement.insertBefore(nextCard, card); updateSortButtons(); }
}

function updateSortButtons() {
    const cards = document.querySelectorAll(".edit-item-card");
    cards.forEach((card, index) => {
        const upBtn = card.querySelector(".btn-move-up");
        const downBtn = card.querySelector(".btn-move-down");
        if (index === 0) { upBtn.style.visibility = "hidden"; } else { upBtn.style.visibility = "visible"; }
        if (index === cards.length - 1) { downBtn.style.visibility = "hidden"; } else { downBtn.style.visibility = "visible"; }
    });
}

function saveEditedMenu() {
    const title = document.getElementById("edit-current-menu-title").value.trim();
    if (!title) { alert("メニュータイトルを入力してください。"); return; }
    const cards = document.querySelectorAll(".edit-item-card");
    let items = [];
    for (let card of cards) {
        const name = card.querySelector(".item-name").value.trim();
        const w = parseInt(card.querySelector(".item-w").value) || 0;
        const r = parseInt(card.querySelector(".item-r").value) || 0;
        const s = parseInt(card.querySelector(".item-s").value) || 1;
        const rand = card.querySelector(".item-rand").checked;
        const c = card.querySelector(".item-c").checked;
        if (!name) { alert("種目名が空のカードがあります。"); return; }
        items.push({ name, w, r, s, rand, c });
    }
    if (items.length === 0) { alert("最低でも１つの種目を追加してください。"); return; }
    MENUS[temporaryEditKey] = { title, items };
    saveMenusToStorage();
    alert("💾 メニューの中身を変更保存しました！");
    refreshMainScreenSelect();
    openEditScreen1();
}

function deleteMenu() {
    if (confirm("このトレーニングメニューを完全に削除しますか？")) {
        delete MENUS[temporaryEditKey]; saveMenusToStorage(); refreshMainScreenSelect(); openEditScreen1();
    }
}

// --- タイマー処理 ---
function startTraining() {
    selectedMenuKey = document.getElementById("menu-select").value;
    if (!selectedMenuKey) return;
    
    // ユーザー操作由来のコンテキスト初期化
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    resumeAudioContext();
    playTone(440, 0.01);

    // スリープ防止を起動
    requestWakeLock();

    const parsedMainItems = buildMainTimelineItems(MENUS[selectedMenuKey].items);
    currentTimeline = [...COMMON_WARMUP, ...parsedMainItems, ...COMMON_COOLDOWN];
    
    // プルダウンの生成
    buildJumpSelectOptions();

    currentIdx = 0; isPaused = false;
    changeScreen('screen-timer');
    runPhase();
}

// 【途中から選択】ジャンプ用プルダウンの生成
function buildJumpSelectOptions() {
    const select = document.getElementById("timer-jump-select");
    select.innerHTML = "";
    currentTimeline.forEach((phase, index) => {
        let opt = document.createElement("option");
        opt.value = index;
        opt.textContent = `${index + 1}. ${phase.name}`;
        select.appendChild(opt);
    });
}

// プルダウン選択時のジャンプ処理
function jumpToPhase(index) {
    resumeAudioContext(); // 音声コンテキストの復帰
    currentIdx = parseInt(index);
    runPhase();
}

function runPhase() {
    clearInterval(timerId); clearTimeout(directionTimerId); clearTimeout(clearArrowTimerId);
    document.getElementById("direction-arrow").textContent = "";

    if (currentIdx >= currentTimeline.length) {
        saveLog("completed");
        alert("🎉 すべてのトレーニングが完了しました！");
        changeScreen('screen-start');
        return;
    }
    if (currentIdx < 0) currentIdx = 0;

    // ジャンププルダウンの選択位置を同期
    document.getElementById("timer-jump-select").value = currentIdx;

    const phase = currentTimeline[currentIdx];
    document.getElementById("current-phase").textContent = phase.name;
    document.getElementById("next-phase").textContent = (currentIdx + 1 < currentTimeline.length) ? "次: " + currentTimeline[currentIdx + 1].name : "次: 終了";

    playTone(880, 0.15); setTimeout(() => playTone(880, 0.15), 180);

    if ((phase.type === "count" || phase.name.includes("回")) && !phase.name.includes("休憩")) {
        document.getElementById("time-left").style.display = "none";
        document.getElementById("btn-done").style.display = "block";
        document.getElementById("btn-pause").style.display = "none";
        if (phase.isRandom) triggerRandomDirection();
    } else {
        document.getElementById("time-left").style.display = "block";
        document.getElementById("btn-done").style.display = "none";
        document.getElementById("btn-pause").style.display = "block";
        
        timeLeft = phase.duration;
        updateTimerDisplay();

        if (phase.isRandom) triggerRandomDirection();

        timerId = setInterval(() => {
            if (isPaused) return;
            timeLeft--; updateTimerDisplay();
            if (timeLeft <= 3 && timeLeft > 0) playTone(440, 0.1);
            if (timeLeft <= 0) { currentIdx++; runPhase(); }
        }, 1000);
    }
}

function updateTimerDisplay() { document.getElementById("time-left").textContent = timeLeft; }

function togglePause() {
    resumeAudioContext(); // ボタン操作タイミングでも音声復帰を促す
    isPaused = !isPaused;
    document.getElementById("btn-pause").textContent = isPaused ? "再開" : "一時停止";
    document.getElementById("btn-pause").className = isPaused ? "btn-success" : "btn-warning";
}

function pressDone() { resumeAudioContext(); currentIdx++; runPhase(); }
function nextMenu() { resumeAudioContext(); currentIdx++; runPhase(); }
function prevMenu() { resumeAudioContext(); if (currentIdx > 0) { currentIdx--; runPhase(); } }

function interruptTraining() {
    if (confirm("トレーニングを中断しますか？")) {
        clearInterval(timerId); clearTimeout(directionTimerId); clearTimeout(clearArrowTimerId);
        saveLog("interrupted"); changeScreen('screen-start');
    }
}

function triggerRandomDirection() {
    if (isPaused) { directionTimerId = setTimeout(triggerRandomDirection, 1000); return; }
    
    const phase = currentTimeline[currentIdx];
    const phaseName = phase ? phase.name : "";

    document.getElementById("direction-arrow").textContent = DIRECTIONS[Math.floor(Math.random() * DIRECTIONS.length)];
    playTone(660, 0.05);
    
    clearTimeout(clearArrowTimerId);
    clearArrowTimerId = setTimeout(() => {
        document.getElementById("direction-arrow").textContent = "";
    }, 1000);
    
    let nextIntervalSec = 2 + Math.random() * 2; 
    if (phaseName.includes("ステップ")) { nextIntervalSec = 1 + Math.random() * 2; }
    else if (phaseName.includes("フットワーク")) { nextIntervalSec = 2 + Math.random() * 2; }

    directionTimerId = setTimeout(triggerRandomDirection, nextIntervalSec * 1000);
}

// カレンダー・ログ
let currentCalDate = new Date();
function getLogData() { return JSON.parse(localStorage.getItem("habit_timer_logs") || "{}"); }
function saveLog(status) {
    const logs = getLogData();
    const todayStr = `${currentCalDate.getFullYear()}-${String(currentCalDate.getMonth() + 1).padStart(2, '0')}-${String(currentCalDate.getDate()).padStart(2, '0')}`;
    logs[todayStr] = { status, title: MENUS[selectedMenuKey] ? MENUS[selectedMenuKey].title : "カスタムトレーニング", time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) };
    localStorage.setItem("habit_timer_logs", JSON.stringify(logs));
}
function moveMonth(dir) { currentCalDate.setMonth(currentCalDate.getMonth() + dir); renderCalendar(); }

function renderCalendar() {
    const year = currentCalDate.getFullYear(), month = currentCalDate.getMonth();
    document.getElementById("calendar-month-year").textContent = `${year}年 ${month + 1}月`;
    const grid = document.getElementById("calendar-grid"); grid.innerHTML = "";

    ["日", "月", "火", "水", "木", "金", "土"].forEach(w => {
        const d = document.createElement("div"); d.className = "day-name"; d.textContent = w; grid.appendChild(d);
    });

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const logs = getLogData();

    for (let i = 0; i < firstDay; i++) {
        const em = document.createElement("div"); em.className = "day-cell empty"; grid.appendChild(em);
    }

    for (let day = 1; day <= daysInMonth; day++) {
        const cell = document.createElement("div"); cell.className = "day-cell"; cell.textContent = day;
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        if (logs[dateStr]) cell.classList.add(logs[dateStr].status);
        
        cell.onclick = () => {
            const detailBox = document.getElementById("log-details");
            if (logs[dateStr]) {
                const state = logs[dateStr].status === "completed" ? "🟢 完了" : "🟡 中断";
                detailBox.innerHTML = `<strong>${day}日のログ:</strong><br>${state} (${logs[dateStr].time})<br>${logs[dateStr].title}`;
            } else {
                detailBox.innerHTML = `<strong>${day}日のログ:</strong><br>未実施のログ、またはデータがありません。`;
            }
        };
        grid.appendChild(cell);
    }
}
</script>
